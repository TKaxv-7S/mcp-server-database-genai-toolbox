name: Label all new/reopened issues with P2
on:
  issues:
    types:
      - reopened
      - opened
jobs:
  label_issues_p2:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ["p2"]
            })